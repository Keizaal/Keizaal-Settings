; This file contains Extended Encounters setting defaults.
; Do not modify this file - your changes may be lost if this file is updated in a Extended Encounters update.
; To make changes, make a copy of this file in Data\MCM\Settings\Extended Encounters.ini - values defined there will override those defined in this file and are safe against file updates.

[SetWorldEncounterChance]
iRoadEncounterChance=50
iWildernessEncounterChance=50
iDragonEncounterChance=5

[ToggleWorldEncounterTypes]
bRoadEncounters=1
bWildernessEncounters=1
bDragonEncounters=1

[ToggleSpecificEncounters]
bDraugrSwarm=0
bFactionsHuntPlayer=1

[ToggleSpecialFeatures]
bDynamicPlacement=1

[SetLocationEncounterChance]
iLocationEncounterChance=10
iLocationInteractionChance=10
iLocationTimeout=12

[ToggleLocationEncounterTypes]
bLocationEncounters=1
bLocationInteractions=1

[ToggleLocationRaidEncounters]
bBanditRaids=0
bGuardRaids=1
bCivilWarRaids=1

[SetSituationEncounterChance]
iSleepEncounterChance=0
iWaitEncounterChance=0
iFastTravelEncounterChance=0

[ToggleSituationEncounterTypes]
bSleepEncounters=1
bWaitEncounters=1
bFastTravelEncounters=1
bNotifications=1

[Maintenance]
bEnabled=1
iLoadingDelay=0
sLoadSettings=
sResetSettings=

