[Main]
; FrameShape
; 0=Rectangle
; 1=Circle
FrameShape=1
FrameColor=0x666666
HideFrame=false

;If you choose Circle Frame, its radius will be Width / 2.
Width=230
Height=230
Alpha=100

; Align
; 0=TOP_LEFT
; 1=TOP_RIGHT
; 2=BOTTOM_LEFT
; 3=BOTTOM_RIGHT
Align=1

OffsetX=-105
OffsetY=85
MarkerSize=35
MinFrustumWidth=1000
ZoomPercent1=75
ZoomPercent2=50
ToggleZoomKeyCode=37
ToggleVisibilityKeyCode=49
InitiallyHidden=true
FixWaterFlickering=true

; Choose the marker to be displayed on the minimap and add numbers.
; 1  - Door
; 2  - Quest
; 4  - Actor_Dead
; 8  - Actor_Follower
; 16 - Actor_Hostile
; 32 - Actor_Default
DisplayMarker=63
