[Settings]

;Only NPCs that are within this angle in front of the player can make comments.
;An angle of 180 will allow all NPCs.
Max Heading Angle = 30.000000

;Only NPCs that are within this distance of the player can make comments.
Min Greeting Distance = 150.000000

;Applies shaders on NPCs.
;Red: too far away. 
;Blue: within greeting distance but not facing player. 
;Green: within greeting distance and face to face.
Enable Debug Shaders = false
