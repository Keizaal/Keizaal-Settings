
[Main]

EnableModFunctions = 1
;Set if enable all plugin's functions, set value to 1 is enable, 0 is disable.

##EnableDebugMessage = 0
;Set if enable Debug Message Printout, set value to 1 is enable, 0 is disable.

EnableSpellEffect = 1
;Set if enable Characters play animation when hit by hurtful spell, set value to 1 is enable, 0 is disable.

EnablePlayerCharacterEffect = 1
;Set if enable Player Character play animation when hit, set value to 1 is enable, 0 is disable.

EnableNPCEffect = 1
;Set if enable Npc play animation when hit, set value to 1 is enable, 0 is disable.

AnimationGraphNum = 2
;Set the number of animation graph that add into the framework. Do Not Change this setting if you are not mod author!

[AnimationGraph1]

GraphName = defaultmale

AnimationEventName = Flinch

GraphVariableFloatName = blendFlinch


[AnimationGraph2]

GraphName = defaultfemale

AnimationEventName = Flinch

GraphVariableFloatName = blendFlinch

