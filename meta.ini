notes="<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML 4.0//EN\" \"http://www.w3.org/TR/REC-html40/strict.dtd\">\n<html><head><meta name=\"qrichtext\" content=\"1\" /><style type=\"text/css\">\np, li { white-space: pre-wrap; }\n</style></head><body style=\" font-family:'MS Shell Dlg 2'; font-size:14px; font-weight:400; font-style:normal;\">\n<p style=\"-qt-paragraph-type:empty; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px;\"><br /></p>\n<p style=\" margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px;\"><span style=\" font-size:14px;\">This mod contains Keizaal's pre-configured settings.</span></p></body></html>"
nexusDescription="This is QoL type mod. Adds [url=https://www.nexusmods.com/skyrimspecialedition/mods/53000]MCM Helper[/url] support by creating from scratch MCM for [url=https://www.nexusmods.com/skyrimspecialedition/mods/20209/]Obsidian Weathers and Seasons MCM Patch[/url] by [url=https://www.nexusmods.com/skyrimspecialedition/users/5687342]Fudgyduff[/url]. Saves settings as you change them, automatically loads settings on startup or game load, so you don't have to spend time in MCM again with each game. Localization support. No plugin.\n<br />\n<br />USAGE:\n<br />1. Install mod.\n<br />2. Configure \"Obsidian Weathers and Seasons MCM Patch\" in MCM.\n<br />3. Every game will automatically load user settings.\n<br />\n<br />Additionally, adds:\n<br />[list]\n<br />[*]Ability to set delay in seconds for automatic loading.\n<br />[*]Ability to disable automatic loading of script-specific settings.\n<br />[*]Ability to load settings manually.\n<br />[*]Ability to reset all settings manually.\n<br />[/list]Changed[list]\n<br />[*]The configuration spell is toggleable instead of the delete button. This eliminates the need to manually remove the spell with MCM.\n<br />[/list]\n<br />\n<br />[b][u]FAQ:[/u]\n<br />[/b]\n<br />[b]1. The main mod has been updated, does your mod need an update?[/b]\n<br />If the MCM menu file has changed, yes.\n<br />\n<br />[b]2. Main mod updated and MCM changed, when will you update your mod?[/b]\n<br />As soon as possible, if I forget, just send me a PM.\n<br />\n<br />[b]3. Is your mod compatible with mod X?[/b]\n<br />Probably yes, if MCM has not been changed. Most \"Settings Loaders\" mods just change the MCM. If you are unsure, please ask me.\n<br />\n<br />[b]4. Will you combine all your mods into one?[/b]\n<br />No, this will drastically increase my mod management time, make bug fixes, version update, and the comments section a mess. These mods do not take plugin slots.\n<br />\n<br />[b]5. Why MCM is empty?[/b]\n<br />You need to install MCM Helper for your version of the game. Make sure you don't mix mods for SE with the AE version.\n<br />\n<br />\n<br />[b][font=Georgia][center]MODS[/center][/font][/b][font=Courier New][url=https://www.nexusmods.com/skyrim/mods/89191]LE[/url]|[url=https://www.nexusmods.com/skyrimspecialedition/mods/15558]SE[/url] Spell Organizer - Hide Remove Spells [url=https://www.nexusmods.com/skyrim/mods/89207]LE[/url]|[url=https://www.nexusmods.com/skyrimspecialedition/mods/15559]SE[/url] Shout Organize - Hide Remove Shouts [url=https://www.nexusmods.com/skyrim/mods/109114]LE[/url]|[url=https://www.nexusmods.com/skyrimspecialedition/mods/55376]SE[/url] Custom HUD Presets\n<br />[/font]\n<br />[center][b][font=Georgia]Settings Loader Series[/font][/b][/center][center][b][font=Georgia][Adds the ability to save and load user settings, automatically loads settings at startup][/font][/b][/center][font=Courier New][url=https://www.nexusmods.com/skyrim/mods/109354]LE[/url]|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56560][u]SE[/u][/url] Enhanced Blood Textures\xa0 \xa0 \xa0 \xa0 [url=https://www.nexusmods.com/skyrim/mods/109108]LE[/url]|[url=https://www.nexusmods.com/skyrimspecialedition/mods/55365]SE[/url] A Matter Of Time\xa0 \xa0 LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56504]SE[/url] Wyrmstooth\xa0 \xa0 \xa0 LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56146]SE[/url] XPMSSE\xa0 \xa0 \xa0\xa0\n<br />LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/55551]SE[/url] Skyrim Immersive Creatures\xa0 \xa0 \xa0LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/55593]SE[/url] Immersive HUD\xa0 \xa0 \xa0 \xa0LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56761]SE[/url] Wintersun\xa0 \xa0 \xa0 \xa0LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56258]SE[/url] AllGUD\n<br />LE|[url=https://www.nexusmods.com/skyrimspecialedition/mods/56603]SE[/url] Realistic Water Two\xa0 \xa0 \xa0 \xa0 \xa0 \